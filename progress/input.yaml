# ProGRESS Configuration File

# Data file directory
data: "path/to/Data" #For multi-period, remember to set the data directory to Data_MP. 

# Inputs for the API
api_key: "yourapikey"
email: "youremail"
affiliation: 'youraffiliation' # no spaces, + can be used instead
name: 'yourname' # no spaces, + can be used instead


# Inputs for Wind
download_w: 'No' # Yes/No based on whether data needs to be downloaded
year_start_w: 2007
year_end_w: 2007

# Inputs for Solar
download_s: 'No' # Yes/No based on whether data needs to be downloaded
year_start_s: 2022   
year_end_s: 2022
n_clusters: 8

# Monte Carlo simulation parameters
samples: 1
sim_hours: 8760
load_factor: 1
model: 'Copper Sheet' # 'Zonal' or 'Copper Sheet'
