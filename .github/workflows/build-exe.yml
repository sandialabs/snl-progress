name: Build Executable

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact-name: snl-progress-macos-arm64
          - os: windows-latest
            artifact-name: snl-progress-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller progress.spec --clean -y

      - name: Smoke test
        shell: bash -l {0}
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            ./dist/snl-progress.app/Contents/MacOS/snl-progress &
          else
            ./dist/snl-progress/snl-progress.exe &
          fi
          APP_PID=$!
          sleep 5
          if kill -0 $APP_PID 2>/dev/null; then
            echo "App launched successfully"
            kill $APP_PID 2>/dev/null || true
          else
            echo "App crashed on launch"
            exit 1
          fi

      - name: Upload executable
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/
