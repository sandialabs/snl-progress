  test-summary:
    name: Test Summary
    needs: [test-matrices, test-plot, test-solar, test-sysdata, test-utilities, test-wind, test-kmeans, test-smoke]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      
      - name: Generate test summary
        id: test-summary
        run: |
          echo "## 🧪 Test Results Summary" > test-summary.md
          echo "" >> test-summary.md
          echo "### 📊 Test Statistics by Module" >> test-summary.md
          echo "| Python Version | Module | Status | Tests Run | Passed | Failed | Skipped | Coverage |" >> test-summary.md
          echo "|----------------|--------|--------|-----------|--------|--------|---------|----------|" >> test-summary.md
          
          # Parse JUnit XML files and generate summary
          for xml_file in */test-results-*.xml; do
            if [ -f "$xml_file" ]; then
              python_version=$(echo "$xml_file" | cut -d'/' -f1 | grep -o '[0-9]\+\.[0-9]\+' | head -1)
              module_name=$(echo "$xml_file" | cut -d'/' -f2 | sed 's/test-results-\(.*\)\.xml/\1/')
              
              # Extract test statistics from XML
              tests=$(grep -o 'tests="[0-9]*"' "$xml_file" | cut -d'"' -f2 | head -1)
              failures=$(grep -o 'failures="[0-9]*"' "$xml_file" | cut -d'"' -f2 | head -1)
              skipped=$(grep -o 'skipped="[0-9]*"' "$xml_file" | cut -d'"' -f2 | head -1)
              
              if [ -z "$tests" ]; then tests=0; fi
              if [ -z "$failures" ]; then failures=0; fi
              if [ -z "$skipped" ]; then skipped=0; fi
              
              passed=$((tests - failures - skipped))
              
              if [ "$failures" -eq 0 ]; then
                status="✅ PASS"
              else
                status="❌ FAIL"
              fi
              
              # Try to get coverage from coverage.xml if it exists
              coverage_file=$(dirname "$xml_file")/coverage.xml
              if [ -f "$coverage_file" ]; then
                coverage=$(grep -o 'line-rate="[0-9.]*"' "$coverage_file" | cut -d'"' -f2 | head -1)
                if [ -n "$coverage" ]; then
                  coverage_percent=$(echo "$coverage * 100" | bc -l | cut -d'.' -f1)
                  coverage_display="${coverage_percent}%"
                else
                  coverage_display="N/A"
                fi
              else
                coverage_display="N/A"
              fi
              
              echo "| $python_version | $module_name | $status | $tests | $passed | $failures | $skipped | $coverage_display |" >> test-summary.md
            fi
          done
          
          echo "" >> test-summary.md
          echo "### 📋 Failed Tests by Module" >> test-summary.md
          echo "```" >> test-summary.md
          for xml_file in */test-results-*.xml; do
            if [ -f "$xml_file" ]; then
              module_name=$(echo "$xml_file" | cut -d'/' -f2 | sed 's/test-results-\(.*\)\.xml/\1/')
              failures=$(grep -o 'failures="[0-9]*"' "$xml_file" | cut -d'"' -f2 | head -1)
              if [ -n "$failures" ] && [ "$failures" -gt 0 ]; then
                echo "=== $module_name ===" >> test-summary.md
                grep -A 5 -B 5 'failure' "$xml_file" | head -20 >> test-summary.md || true
                echo "" >> test-summary.md
              fi
            fi
          done
          echo "```" >> test-summary.md
          
          echo "" >> test-summary.md
          echo "### 📁 Artifacts" >> test-summary.md
          echo "- Test results and coverage reports are available in the workflow artifacts" >> test-summary.md
          echo "- Download artifacts to view detailed logs and coverage reports" >> test-summary.md
          echo "- Each module has its own artifact with specific test results and coverage data" >> test-summary.md
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('test-summary.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
      
      - name: Upload test summary
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: test-summary.md
          retention-days: 30