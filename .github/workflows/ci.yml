name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff
      
      - name: Check code formatting
        run: black --check progress/ tests/
      
      - name: Lint code
        run: ruff check progress/ tests/

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests || true
      
      - name: Type check
        run: mypy progress || mypy . || true
        continue-on-error: true

  test-matrices:
    name: Test Matrices Module
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . || true
          pip install pytest pytest-cov pytest-xdist
      
      - name: Run matrices tests
        run: |
          pytest tests/test_mod_matrices.py \
                 --cov=progress.mod_matrices \
                 --cov-report=xml \
                 --cov-report=term-missing \
                 --junit-xml=tests/test-results-matrices.xml \
                 -v
      
      - name: Upload matrices test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: matrices-test-results-${{ matrix.python-version }}
          path: |
            tests/test-results-matrices.xml
            coverage.xml
          retention-days: 30

