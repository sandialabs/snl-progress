[pytest]
addopts = -q --maxfail=0 --durations=10 -m "not slow"
testpaths = tests
markers =
    slow: long-running tests
    integration: crosses process/network boundaries
    smoke: quick "does it basically work" checks
    realistic: integration tests using production data from Data/ directory
    critical: critical tests that must pass for CI/CD to succeed
    non_critical: tests that can fail without blocking CI/CD
